<div style="font-family: Arial, sans-serif; color: #111; line-height: 1.45; max-width: 760px;">
  <div style="border-bottom: 4px solid #d7ff2f; padding-bottom: 14px; margin-bottom: 18px;">
    <p style="margin: 0; color: #555; font-size: 12px; letter-spacing: 1px; text-transform: uppercase;">
      Williams Drainage Limited
    </p>
    <h2 style="margin: 4px 0 0; font-size: 24px;">Incident Report</h2>
  </div>

  <table style="border-collapse: collapse; width: 100%; margin-bottom: 18px;">
    <tr>
      <td style="padding: 9px 10px; border: 1px solid #ddd; font-weight: bold; width: 34%;">Reported By</td>
      <td style="padding: 9px 10px; border: 1px solid #ddd;">{{incident_reporter}}</td>
    </tr>
    <tr>
      <td style="padding: 9px 10px; border: 1px solid #ddd; font-weight: bold;">Date / Time</td>
      <td style="padding: 9px 10px; border: 1px solid #ddd;">{{incident_date}}</td>
    </tr>
    <tr>
      <td style="padding: 9px 10px; border: 1px solid #ddd; font-weight: bold;">Location</td>
      <td style="padding: 9px 10px; border: 1px solid #ddd;">{{incident_location}}</td>
    </tr>
    <tr>
      <td style="padding: 9px 10px; border: 1px solid #ddd; font-weight: bold;">Machine / Vehicle</td>
      <td style="padding: 9px 10px; border: 1px solid #ddd;">{{incident_machine}}</td>
    </tr>
    <tr>
      <td style="padding: 9px 10px; border: 1px solid #ddd; font-weight: bold;">Photo</td>
      <td style="padding: 9px 10px; border: 1px solid #ddd;">{{photoStatus}}</td>
    </tr>
  </table>
</div>
