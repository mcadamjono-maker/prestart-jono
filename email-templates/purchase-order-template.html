<div style="font-family: Arial, sans-serif; color: #111; line-height: 1.45; max-width: 760px;">
  <div style="border-bottom: 4px solid #d7ff2f; padding-bottom: 14px; margin-bottom: 18px;">
    <p style="margin: 0; color: #555; font-size: 12px; letter-spacing: 1px; text-transform: uppercase;">
      Williams Drainage Limited
    </p>
    <h2 style="margin: 4px 0 0; font-size: 24px;">Purchase Order Request</h2>
  </div>

  <table style="border-collapse: collapse; width: 100%; margin-bottom: 18px;">
    <tr>
      <td style="padding: 9px 10px; border: 1px solid #ddd; font-weight: bold; width: 34%;">Job</td>
      <td style="padding: 9px 10px; border: 1px solid #ddd;">{{job_name}}</td>
    </tr>
    <tr>
      <td style="padding: 9px 10px; border: 1px solid #ddd; font-weight: bold;">Job Number</td>
      <td style="padding: 9px 10px; border: 1px solid #ddd;">{{job_number}}</td>
    </tr>
    <tr>
      <td style="padding: 9px 10px; border: 1px solid #ddd; font-weight: bold;">Requested By</td>
      <td style="padding: 9px 10px; border: 1px solid #ddd;">{{requested_by}}</td>
    </tr>
    <tr>
      <td style="padding: 9px 10px; border: 1px solid #ddd; font-weight: bold;">Supplier</td>
      <td style="padding: 9px 10px; border: 1px solid #ddd;">{{supplier}}</td>
    </tr>
    <tr>
      <td style="padding: 9px 10px; border: 1px solid #ddd; font-weight: bold;">PO Number</td>
      <td style="padding: 9px 10px; border: 1px solid #ddd;">To be generated in Xero by admin/accounts.</td>
    </tr>
  </table>
</div>
